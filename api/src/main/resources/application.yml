spring:
  application:
    name: intensity-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

intensity:
  jwt:
    secret: local-dev-secret-key-must-be-at-least-32-characters-long
    expiration-seconds: 86400
    experience-box-expiration-seconds: 14400
  cors:
    allowed-origin-patterns:
      - http://localhost
      - http://localhost:*
      - http://127.0.0.1:*
      - http://192.168.*.*:*
      - http://10.*.*.*:*
      - https://localhost

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
