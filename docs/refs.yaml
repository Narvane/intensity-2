# Intensity — Central reference map
#
# Convention
# ----------
# - Stable identifier: `id` (kebab-case). Only `path` changes when files move.
# - Cite in Markdown prose: `@ref:<id>` (backticks optional).
# - Human-clickable links: keep standard `[label](path)` where the path matches
#   the `path` field below (resolve from this file when moving artifacts).
# - Agents: consult this map before citing repo documents (`agents/write-task.md`,
#   `agents/order-backlog.md`).
#
# Validation
# ----------
#   python3 scripts/validate-refs.py
#
# Registers every English spec document plus pt-br/it equivalents, entry points,
# and folders used by the development plan and agents.

version: 1

validate:
  scan_files:
    - README.md
    - plano-desenvolvimento-ia.md
    - plano-desenvolvimento-unificado.md
    - backlog.md
    - client/STORE_RELEASE.md
    - openapi/openapi.yaml
    - agents/write-task.md
    - agents/order-backlog.md
    - docs/en/engineering-and-operations/tools.md

entries:
  # --- Entry points & meta ---
  - id: readme
    path: README.md
    label: Repository README
    role: entrypoint

  - id: backlog
    path: backlog.md
    label: Product backlog
    role: backlog

  - id: plano-desenvolvimento-ia
    path: plano-desenvolvimento-ia.md
    label: AI development plan (MVP slices)
    role: operational-plan

  - id: plano-desenvolvimento-unificado
    path: plano-desenvolvimento-unificado.md
    label: Unified post-MVP development plan
    role: operational-plan

  - id: refs
    path: docs/refs.yaml
    label: This reference map
    role: metadata

  - id: agents-write-task
    path: agents/write-task.md
    label: Agent — write backlog tasks
    role: agent

  - id: agents-order-backlog
    path: agents/order-backlog.md
    label: Agent — order backlog
    role: agent

  - id: store-release
    path: client/STORE_RELEASE.md
    label: Store release checklist
    role: engineering

  - id: openapi
    path: openapi/openapi.yaml
    label: OpenAPI REST v1 contract
    role: contract

  - id: deploy-readme
    path: deploy/README.md
    label: VPS production deploy guide
    role: engineering

  # --- Logical folders ---
  - id: docs-en
    path: docs/en
    label: Canonical product & engineering spec (English)
    role: spec-canonical
    locale: en

  - id: docs-pt-br
    path: docs/pt-br
    label: Product spec (Portuguese Brazil)
    role: spec-translation
    locale: pt-br

  - id: docs-it
    path: docs/it
    label: Product spec (Italian)
    role: spec-translation
    locale: it

  # --- Layer 1: Product conception (en) ---
